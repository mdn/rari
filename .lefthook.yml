pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true

    clippy:
      glob: "*.rs"
      run: cargo clippy --locked --all-features --workspace -- -Dwarnings

pre-push:
  parallel: true
  commands:
    test:
      run: cargo test --locked --verbose --workspace --all-targets --features doctest --no-fail-fast

    test-doc:
      run: cargo test --locked --verbose --workspace --doc --features doctest --no-fail-fast

output:
  - summary
  - failure
