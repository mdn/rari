version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    versioning-strategy: increase
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: npm
    directory: /rari-npm
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      npm-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /deps
    schedule:
      interval: daily
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    commit-message:
      prefix: chore
      include: scope
