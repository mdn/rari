name: Sync Cargo.lock

on:
  workflow_dispatch:

  schedule:
    - cron: "30 4 * * 1-5"

permissions: {}

jobs:
  sync-cargo-lock:
    if: github.repository_owner == 'mdn'
    name: Sync Cargo.lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - uses: dtolnay/rust-toolchain@9a1d20035bdbcbc899baabe1e402e85bc33639bc # 1.90

      - name: Run cargo metadata
        run: cargo metadata

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.AUTOMERGE_TOKEN }}
          commit-message: "chore(deps): sync `Cargo.lock`"
          author: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          committer: mdn-bot <108879845+mdn-bot@users.noreply.github.com>
          signoff: false
          branch: sync-cargo-lock
          delete-branch: true
          add-paths: Cargo.lock
          title: "chore(deps): sync `Cargo.lock`"
          body: |
            (This PR was generated by the [`sync-cargo-lock`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/workflows/sync-cargo-lock.yml) workflow.)
          draft: false
